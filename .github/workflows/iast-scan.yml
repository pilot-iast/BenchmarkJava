name: IAST scan

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  iast-crawl:
    if: false  # отключён — активен iast-scan в BenchmarkPython
    runs-on: ubuntu-latest
    timeout-minutes: 150
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: zulu
          cache: maven

      - name: Download IAST Java agent
        env:
          IAST_SERVER_URL: ${{ secrets.IAST_SERVER_URL }}
          IAST_TOKEN: ${{ secrets.IAST_TOKEN }}
          IAST_PROJECT_NAME: ${{ vars.IAST_PROJECT_NAME }}
          IAST_TEMPLATE_ID: ${{ vars.IAST_TEMPLATE_ID }}
          PROJECT_VERSION: run-${{ github.run_number }}
        run: |
          set -euo pipefail
          test -n "${IAST_SERVER_URL:-}" || { echo "IAST_SERVER_URL secret is required"; exit 1; }
          test -n "${IAST_TOKEN:-}" || { echo "IAST_TOKEN secret is required"; exit 1; }
          server="${IAST_SERVER_URL%/}"
          project="${IAST_PROJECT_NAME:-benchmarkjava}"
          template_id="${IAST_TEMPLATE_ID:-2}"
          version="${PROJECT_VERSION}"
          echo "PROJECT_VERSION=${version}" >> "${GITHUB_ENV}"
          echo "IAST_PROJECT_NAME=${project}" >> "${GITHUB_ENV}"
          mkdir -p iast-tool
          curl -fsSk -G \
            -H "Authorization: Token ${IAST_TOKEN}" \
            --data-urlencode "url=${server}" \
            --data-urlencode "language=java" \
            --data-urlencode "projectName=${project}" \
            --data-urlencode "projectVersion=${version}" \
            --data-urlencode "template_id=${template_id}" \
            "${server}/api/v1/agent/download" \
            -o iast-tool/agent.jar
          ls -lh iast-tool/agent.jar
          test -s iast-tool/agent.jar
          unzip -p iast-tool/agent.jar iast.properties | grep -E '^(iast\.server\.|engine\.|project\.)' || true

      - name: Install OWASP BenchmarkUtils crawler plugin
        run: |
          set -euo pipefail
          git clone --depth 1 https://github.com/OWASP-Benchmark/BenchmarkUtils.git /tmp/BenchmarkUtils
          mvn -f /tmp/BenchmarkUtils/pom.xml install -DskipTests -q

      - name: Start Benchmark with IAST agent
        run: |
          set -euo pipefail
          mvn initialize -q
          # Benchmark crawl generates ~2700 method pool reports; default upload pool (10 threads)
          # cannot drain the queue before CI stops Tomcat. Tune only for this pipeline.
          nohup mvn clean package cargo:run -Pdeploywimmunity \
            -D-Dorg.owasp.esapi.logSpecial.discard=true \
            -Dcargo.jvmargs="-Xmx4G -javaagent:${PWD}/iast-tool/agent.jar -Dimmunity.pool.max.size=250" \
            > benchmark-server.log 2>&1 &
          echo $! > benchmark-server.pid
          echo "Started Maven cargo:run (pid $(cat benchmark-server.pid))"

      - name: Wait for application
        run: |
          set -euo pipefail
          for attempt in $(seq 1 90); do
            if curl -kfsS https://127.0.0.1:8443/benchmark/ >/dev/null 2>&1; then
              echo "Benchmark is up after ${attempt} attempt(s)"
              exit 0
            fi
            echo "Waiting for Benchmark... (${attempt}/90)"
            sleep 20
          done
          echo "Application did not become ready in time" >&2
          tail -n 200 benchmark-server.log || true
          tail -n 100 target/cargo-output.log 2>/dev/null || true
          exit 1

      - name: Verify IAST agent is attached to Tomcat JVM
        run: |
          set -euo pipefail
          test -s iast-tool/agent.jar
          agent_flags="$(jps -v | grep -F 'iast-tool/agent.jar' | grep -F 'Bootstrap' || true)"
          echo "$agent_flags"
          test -n "$agent_flags"
          if echo "$agent_flags" | grep -Fq 'org.codehaus.plexus.classworlds.launcher.Launcher'; then
            echo "Agent is on Maven Launcher — registration will fail" >&2
            exit 1
          fi
          count="$(echo "$agent_flags" | tr ' ' '\n' | grep -c 'iast-tool/agent.jar' || true)"
          echo "javaagent count: $count"
          test "$count" -ge 1
          echo "Agent attached to Tomcat JVM; giving it 30s to register with panel..."
          sleep 30

      - name: Run OWASP Benchmark crawler
        run: |
          set -euo pipefail
          ./runCrawler.sh

      - name: Wait for method pool upload
        run: |
          set -euo pipefail
          echo "Waiting 30 minutes for agent to upload method pools (immunity.pool.max.size=250)..."
          sleep 1800
          grep -F 'io.immunity.iast.agent' benchmark-server.log target/cargo-output.log 2>/dev/null | tail -30 || true
          find /tmp -path '*/immunity-*/logs/*.log' -print -exec tail -n 60 {} \; 2>/dev/null || true

      - name: Score IAST vs OWASP Benchmark ground truth
        env:
          PANEL_URL: ${{ secrets.PANEL_URL }}
          PANEL_USER: ${{ secrets.PANEL_USER }}
          PANEL_PASS: ${{ secrets.PANEL_PASS }}
          IAST_SERVER_URL: ${{ secrets.IAST_SERVER_URL }}
          IAST_PROJECT_NAME: ${{ env.IAST_PROJECT_NAME }}
          PROJECT_VERSION: ${{ env.PROJECT_VERSION }}
          PANEL_VERIFY_SSL: "false"
        run: |
          set -euo pipefail
          export PANEL_URL="${PANEL_URL:-${IAST_SERVER_URL:-}}"
          export IAST_PROJECT_NAME="${IAST_PROJECT_NAME:-benchmarkjava}"
          if [ -z "${PANEL_URL:-}" ] || [ -z "${PANEL_USER:-}" ] || [ -z "${PANEL_PASS:-}" ]; then
            echo "PANEL_URL (or IAST_SERVER_URL), PANEL_USER, PANEL_PASS are required for scorecard" >&2
            exit 1
          fi
          python3 -m pip install -q -r security/requirements.txt
          python3 security/score_iast_benchmark.py \
            --output-json scorecard-iast.json \
            --output-md scorecard-iast.md
          test -s scorecard-iast.json
          test -s scorecard-iast.md

      - name: Upload scorecard
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scorecard-iast
          path: |
            scorecard-iast.json
            scorecard-iast.md

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: iast-scan-logs
          path: |
            benchmark-server.log
            target/cargo-output.log
            target/cargo.log

      - name: Stop Benchmark server
        if: always()
        run: |
          if [ -f benchmark-server.pid ]; then
            kill "$(cat benchmark-server.pid)" 2>/dev/null || true
          fi
          pkill -f 'cargo:run' 2>/dev/null || true
          pkill -f 'org.apache.catalina.startup.Bootstrap' 2>/dev/null || true

      - name: Show application logs on failure
        if: failure()
        run: |
          tail -n 200 benchmark-server.log 2>/dev/null || true
          tail -n 100 target/cargo-output.log 2>/dev/null || true
